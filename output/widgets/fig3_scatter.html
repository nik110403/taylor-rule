<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">Federal Reserve · Deep Dive · 2015–2024</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">Policy Looseness and Subsequent Inflation</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Taylor Rule deviation in quarter t vs. core PCE inflation two quarters later · 2015–2024</p>
<div style="display:grid;grid-template-columns:repeat(1,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">OLS slope</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">0.50pp inflation per 1pp deviation (t+2)</div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="infl" style="display:inline-block;width:20px;height:2px;background:#888;border-radius:1px;flex-shrink:0;"></span>OLS trend line</span></div>
<div style="position:relative; width:100%; height:300px;">
<canvas id="taylor-fig3" role="img" aria-label="Scatter: Taylor deviation vs core PCE two quarters later, 2015-2024"></canvas>
</div>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Federal Reserve Economic Data (FRED)</a>, CBO. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
  var canvas = document.getElementById('taylor-fig3');
  if (!canvas) return;
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.documentElement.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)'       : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)'       : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)'       : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A'                : '#E8E6DF',
      taylor1: light ? '#185FA5'                : '#60a5fa',
      taylor2: light ? '#1D9E75'                : '#34d399',
      taylor3: light ? '#BA7517'                : '#f59e0b',
      dev_pos: light ? '#D85A30'                : '#f87171',
      dev_neg: light ? '#185FA5'                : '#60a5fa',
      ecb:     light ? '#534AB7'                : '#a78bfa',
      infl:    light ? '#A32D2D'                : '#ef4444',
      covid:   light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      text:    light ? '#1C1C1A'                : '#E8E6DF',
      muted:   light ? 'rgba(0,0,0,0.50)'       : 'rgba(255,255,255,0.55)',
    };
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) {
      if (sw.dataset.dash) sw.style.borderBottomColor = c[sw.dataset.k];
      else sw.style.background = c[sw.dataset.k];
    });
    var scatterLabels = ["2015-Q1","2015-Q2","2015-Q3","2015-Q4","2016-Q1","2016-Q2","2016-Q3","2016-Q4","2017-Q1","2017-Q2","2017-Q3","2017-Q4","2018-Q1","2018-Q2","2018-Q3","2018-Q4","2019-Q1","2019-Q2","2019-Q3","2019-Q4","2020-Q1","2020-Q2","2020-Q3","2020-Q4","2021-Q1","2021-Q2","2021-Q3","2021-Q4","2022-Q1","2022-Q2","2022-Q3","2022-Q4","2023-Q1","2023-Q2","2023-Q3","2023-Q4","2024-Q1","2024-Q2"];
    var ptColors = ["#93C5FD","#93C5FD","#93C5FD","#93C5FD","#85B5F0","#85B5F0","#85B5F0","#85B5F0","#79A6E3","#79A6E3","#79A6E3","#79A6E3","#6C96D6","#6C96D6","#6C96D6","#6C96D6","#5F87C9","#5F87C9","#5F87C9","#5F87C9","#5177BD","#5177BD","#5177BD","#5177BD","#4568B0","#4568B0","#4568B0","#4568B0","#3858A3","#3858A3","#3858A3","#3858A3","#2B4996","#2B4996","#2B4996","#2B4996","#1E3A8A","#1E3A8A"];
    var r2 = 0.7001;
    var r2Plugin = {
      id: 'r2label',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea;
        ctx.save();
        ctx.fillStyle = c.tick;
        ctx.font = '11px system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('R² = ' + r2.toFixed(2), ca.right - 6, ca.bottom - 6);
        ctx.restore();
      }
    };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'scatter',
      plugins: [r2Plugin],
      data: {
        datasets: [
          { label: 'Quarters', data: [{x:0.925,y:1.232},{x:0.921,y:1.192},{x:0.825,y:1.457},{x:0.503,y:1.552},{x:0.814,y:1.685},{x:0.843,y:1.77},{x:1.122,y:1.679},{x:1.135,y:1.576},{x:0.742,y:1.423},{x:0.37,y:1.577},{x:0.173,y:1.909},{x:0.564,y:1.936},{x:1.006,y:1.96},{x:0.745,y:2.038},{x:0.706,y:1.616},{x:0.313,y:1.657},{x:-0.413,y:1.632},{x:-0.169,y:1.545},{x:0.455,y:1.527},{x:0.901,y:0.97},{x:0.861,y:1.48},{x:-0.08,y:1.509},{x:0.531,y:2.199},{x:0.904,y:3.862},{x:2.411,y:4.014},{x:5.491,y:5.215},{x:5.867,y:5.593},{x:8.25,y:5.316},{x:8.276,y:5.606},{x:6.626,y:4.967},{x:5.762,y:4.783},{x:3.289,y:4.384},{x:2.498,y:3.688},{x:1.448,y:3.112},{x:0.397,y:3.122},{x:-0.377,y:2.753},{x:-0.592,y:2.839},{x:-1.031,y:2.989}],
            backgroundColor: ptColors, pointRadius: 5, pointHoverRadius: 7 },
          { label: 'OLS trend', type: 'line', data: [{x:-1.031,y:1.277},{x:-0.841,y:1.371},{x:-0.651,y:1.466},{x:-0.461,y:1.56},{x:-0.271,y:1.655},{x:-0.082,y:1.749},{x:0.108,y:1.844},{x:0.298,y:1.938},{x:0.488,y:2.033},{x:0.678,y:2.127},{x:0.868,y:2.222},{x:1.058,y:2.316},{x:1.248,y:2.411},{x:1.438,y:2.505},{x:1.628,y:2.6},{x:1.818,y:2.694},{x:2.008,y:2.789},{x:2.198,y:2.883},{x:2.388,y:2.978},{x:2.578,y:3.072},{x:2.767,y:3.167},{x:2.957,y:3.261},{x:3.147,y:3.356},{x:3.337,y:3.45},{x:3.527,y:3.545},{x:3.717,y:3.639},{x:3.907,y:3.734},{x:4.097,y:3.828},{x:4.287,y:3.922},{x:4.477,y:4.017},{x:4.667,y:4.111},{x:4.857,y:4.206},{x:5.047,y:4.3},{x:5.237,y:4.395},{x:5.427,y:4.489},{x:5.617,y:4.584},{x:5.806,y:4.678},{x:5.996,y:4.773},{x:6.186,y:4.867},{x:6.376,y:4.962},{x:6.566,y:5.056},{x:6.756,y:5.151},{x:6.946,y:5.245},{x:7.136,y:5.34},{x:7.326,y:5.434},{x:7.516,y:5.529},{x:7.706,y:5.623},{x:7.896,y:5.718},{x:8.086,y:5.812},{x:8.276,y:5.907}],
            borderColor: c.infl, borderWidth: 1.5, borderDash: [4,3],
            pointRadius: 0, fill: false, tension: 0 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 26, right: 20, left: 0, bottom: 4 } },
        interaction: { mode: 'nearest', intersect: false },
        plugins: { legend: { display: false }, title: { display: false },
          tooltip: { callbacks: { label: function(ctx) {
            if (ctx.datasetIndex !== 0) return null;
            var pt = ctx.raw, lbl = scatterLabels[ctx.dataIndex];
            return ['Q: ' + lbl, 'Deviation: ' + pt.x.toFixed(2) + 'pp', 'Inflation +2Q: ' + pt.y.toFixed(2) + '%'];
          }}}},
        scales: {
          x: {
            border: { display: false },
            grid: { color: c.grid },
            title: { display: true, text: 'Taylor deviation (pp)',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } }
          },
          y: {
            border: { display: false },
            grid: { color: c.grid },
            title: { display: true, text: 'Core PCE, % YoY (t+2)',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + '%'; } }
          }
        }
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
