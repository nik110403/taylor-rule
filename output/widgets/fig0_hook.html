<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">Federal Reserve · Deep Dive · 2015–2024</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">The Fed's Departure from Rules-Based Policy</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Baseline Taylor Rule deviation and core PCE inflation · percentage points and % YoY · quarterly</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Peak policy gap</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">+8.3pp</div><div style="font-size:0.68rem;color:var(--muted);margin-top:2px;">Q1 2022</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Peak core PCE</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">5.6%</div><div style="font-size:0.68rem;color:var(--muted);margin-top:2px;">Q3 2022</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Quarters below prescription</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">33 of 40</div><div style="font-size:0.68rem;color:var(--muted);margin-top:2px;">2015–2024</div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="dev_pos" style="display:inline-block;width:20px;height:2px;background:#888;border-radius:1px;flex-shrink:0;"></span>Policy gap (Taylor deviation)</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="infl" data-dash="1" style="display:inline-block;width:20px;height:0;border-bottom:2px dashed #888;flex-shrink:0;"></span>Core PCE inflation</span></div>
<div style="position:relative; width:100%; height:200px;">
<canvas id="taylor-hook" role="img" aria-label="Dual-axis: Taylor Rule policy gap and core PCE inflation, 2015-2024"></canvas>
</div>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Federal Reserve Economic Data (FRED)</a>, CBO. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
  var canvas = document.getElementById('taylor-hook');
  if (!canvas) return;
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.documentElement.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)'       : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)'       : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)'       : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A'                : '#E8E6DF',
      dev_pos: light ? '#D85A30'                : '#f87171',
      dev_neg: light ? '#185FA5'                : '#60a5fa',
      infl:    light ? '#A32D2D'                : '#ef4444',
      covid:   light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      text:    light ? '#1C1C1A'                : '#E8E6DF',
      muted:   light ? 'rgba(0,0,0,0.50)'       : 'rgba(255,255,255,0.55)',
    };
  }
  function hexAlpha(hex, a) {
    var r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) {
      if (sw.dataset.dash) sw.style.borderBottomColor = c[sw.dataset.k];
      else sw.style.background = c[sw.dataset.k];
    });
    var labels = ["2015-Q1","2015-Q2","2015-Q3","2015-Q4","2016-Q1","2016-Q2","2016-Q3","2016-Q4","2017-Q1","2017-Q2","2017-Q3","2017-Q4","2018-Q1","2018-Q2","2018-Q3","2018-Q4","2019-Q1","2019-Q2","2019-Q3","2019-Q4","2020-Q1","2020-Q2","2020-Q3","2020-Q4","2021-Q1","2021-Q2","2021-Q3","2021-Q4","2022-Q1","2022-Q2","2022-Q3","2022-Q4","2023-Q1","2023-Q2","2023-Q3","2023-Q4","2024-Q1","2024-Q2","2024-Q3","2024-Q4"];
    var dev1   = [0.93, 0.92, 0.83, 0.50, 0.81, 0.84, 1.12, 1.14, 0.74, 0.37, 0.17, 0.56, 1.01, 0.75, 0.71, 0.31, -0.41, -0.17, 0.46, 0.90, 0.86, -0.08, 0.53, 0.90, 2.41, 5.49, 5.87, 8.25, 8.28, 6.63, 5.76, 3.29, 2.50, 1.45, 0.40, -0.38, -0.59, -1.03, -0.61, 0.18];
    var fillPlugin = {
      id: 'devFill',
      beforeDatasetsDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea;
        var meta = chart.getDatasetMeta(0);
        var ys = chart.scales.y;
        var y0 = ys.getPixelForValue(0);
        var posColor = hexAlpha(c.dev_pos, 0.35);
        var negColor = hexAlpha(c.dev_neg, 0.25);
        ctx.save();
        ctx.beginPath();
        ctx.rect(ca.left, ca.top, ca.width, ca.height);
        ctx.clip();
        var pts = [];
        for (var i = 0; i < meta.data.length; i++) {
          if (dev1[i] === null) continue;
          pts.push({ px: meta.data[i].x, py: meta.data[i].y, val: dev1[i] });
        }
        for (var j = 0; j < pts.length - 1; j++) {
          var p1 = pts[j], p2 = pts[j+1];
          var pos1 = p1.val >= 0, pos2 = p2.val >= 0;
          if (pos1 === pos2) {
            ctx.beginPath();
            ctx.moveTo(p1.px, y0); ctx.lineTo(p1.px, p1.py);
            ctx.lineTo(p2.px, p2.py); ctx.lineTo(p2.px, y0);
            ctx.closePath();
            ctx.fillStyle = pos1 ? posColor : negColor;
            ctx.fill();
          } else {
            var t = p1.val / (p1.val - p2.val);
            var crossPx = p1.px + t * (p2.px - p1.px);
            ctx.beginPath();
            ctx.moveTo(p1.px, y0); ctx.lineTo(p1.px, p1.py); ctx.lineTo(crossPx, y0);
            ctx.closePath();
            ctx.fillStyle = pos1 ? posColor : negColor; ctx.fill();
            ctx.beginPath();
            ctx.moveTo(crossPx, y0); ctx.lineTo(p2.px, p2.py); ctx.lineTo(p2.px, y0);
            ctx.closePath();
            ctx.fillStyle = pos2 ? posColor : negColor; ctx.fill();
          }
        }
        ctx.restore();
      }
    };
    var covidPlugin = {
      id: 'covidShade',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, xs = chart.scales.x;
        var i1 = labels.indexOf('2020-Q1'), i2 = labels.indexOf('2022-Q1');
        if (i1 < 0 || i2 < 0) return;
        var px1 = xs.getPixelForValue(i1), px2 = xs.getPixelForValue(i2);
        ctx.save();
        ctx.fillStyle = c.covid;
        ctx.fillRect(px1, ca.top, px2 - px1, ca.bottom - ca.top);
        ctx.restore();
      }
    };
    var zeroLinePlugin = {
      id: 'zeroLine',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, ys = chart.scales.y;
        var y0 = ys.getPixelForValue(0);
        ctx.save();
        ctx.strokeStyle = c.tick; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = c.tick;
        ctx.font = '9px system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('Rules-based prescription', ca.right - 4, y0 - 4);
        ctx.restore();
      }
    };
    var annotPlugin = {
      id: 'annotations',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, xs = chart.scales.x;
        var annots = [
          { lbl: '2020-Q3', text: 'AIT announced',   yOff: 0 },
          { lbl: '2021-Q4', text: 'Taper decision',  yOff: 13 },
          { lbl: '2022-Q1', text: 'First rate hike', yOff: 0 }
        ];
        ctx.save();
        annots.forEach(function(a) {
          var idx = labels.indexOf(a.lbl);
          if (idx < 0) return;
          var px = xs.getPixelForValue(idx);
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = c.tick; ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
          ctx.setLineDash([]); ctx.globalAlpha = 1;
          ctx.fillStyle = c.yTick;
          ctx.font = 'bold 10px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(a.text, px, ca.top - 6 - a.yOff);
        });
        ctx.restore();
      }
    };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'line',
      plugins: [fillPlugin, covidPlugin, zeroLinePlugin, annotPlugin],
      data: {
        labels: labels,
        datasets: [
          { label: 'Policy gap (pp)', data: dev1,
            borderColor: c.dev_pos,
            segment: { borderColor: function(sctx) { return sctx.p0.parsed.y >= 0 ? c.dev_pos : c.dev_neg; } },
            borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false, yAxisID: 'y' },
          { label: 'Core PCE inflation (%)', data: [1.28, 1.25, 1.23, 1.19, 1.46, 1.55, 1.69, 1.77, 1.68, 1.58, 1.42, 1.58, 1.91, 1.94, 1.96, 2.04, 1.62, 1.66, 1.63, 1.54, 1.53, 0.97, 1.48, 1.51, 2.20, 3.86, 4.01, 5.21, 5.59, 5.32, 5.61, 4.97, 4.78, 4.38, 3.69, 3.11, 3.12, 2.75, 2.84, 2.99],
            borderColor: c.infl, borderWidth: 1.5, borderDash: [4,3],
            tension: 0.3, pointRadius: 0, fill: false, yAxisID: 'y1' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 26, right: 20, left: 0, bottom: 4 } },
        interaction: { mode: 'index', axis: 'x', intersect: false },
        plugins: { legend: { display: false }, title: { display: false } },
        scales: {
          x: {
            border: { display: false },
            grid: { color: c.grid },
            ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' },
              maxRotation: 0, autoSkip: false,
              callback: function(val, i) { return i % 4 === 0 ? labels[i] : null; } }
          },
          y: {
            position: 'left',
            border: { display: false },
            grid: { color: c.grid },
            title: { display: true, text: 'Policy gap (pp)',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + 'pp'; } }
          },
          y1: {
            position: 'right',
            border: { display: false },
            grid: { drawOnChartArea: false },
            title: { display: true, text: 'Core PCE (%)',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + '%'; } }
          }
        }
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
