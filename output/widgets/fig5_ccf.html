<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">Federal Reserve · Deep Dive · 2015–2024</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">How Many Quarters Does Policy Looseness Lead Inflation?</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Cross-correlation between Taylor Rule deviation and core PCE inflation · lags 0–8 quarters</p>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Peak correlation</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">r = 0.76</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">At lag</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">t+0 quarters</div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="dev_pos" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#888;flex-shrink:0;"></span>Positive correlation</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="dev_neg" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#888;flex-shrink:0;"></span>Negative correlation</span></div>
<div style="position:relative; width:100%; height:200px;">
<canvas id="taylor-fig5" role="img" aria-label="Bar chart: cross-correlation between Taylor deviation and core PCE, lags 0-8 quarters"></canvas>
</div>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Federal Reserve Economic Data (FRED)</a>, CBO. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
  var canvas = document.getElementById('taylor-fig5');
  if (!canvas) return;
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.documentElement.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)'       : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)'       : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)'       : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A'                : '#E8E6DF',
      taylor1: light ? '#185FA5'                : '#60a5fa',
      taylor2: light ? '#1D9E75'                : '#34d399',
      taylor3: light ? '#BA7517'                : '#f59e0b',
      dev_pos: light ? '#D85A30'                : '#f87171',
      dev_neg: light ? '#185FA5'                : '#60a5fa',
      ecb:     light ? '#534AB7'                : '#a78bfa',
      infl:    light ? '#A32D2D'                : '#ef4444',
      covid:   light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      text:    light ? '#1C1C1A'                : '#E8E6DF',
      muted:   light ? 'rgba(0,0,0,0.50)'       : 'rgba(255,255,255,0.55)',
    };
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) {
      if (sw.dataset.dash) sw.style.borderBottomColor = c[sw.dataset.k];
      else sw.style.background = c[sw.dataset.k];
    });
    var labels = ["t+0","t+1","t+2","t+3","t+4","t+5","t+6","t+7","t+8"];
    var vals   = [0.7573, 0.5973, 0.4094, 0.1894, -0.0343, -0.1935, -0.3203, -0.3764, -0.3838];
    var peakLbl = 't+0';
    var peakVal = 0.7573;
    var zeroLinePlugin = {
      id: 'zeroLine',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, ys = chart.scales.y;
        var y0 = ys.getPixelForValue(0);
        ctx.save();
        ctx.strokeStyle = c.tick; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = c.tick;
        ctx.font = '9px system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('Rules-based prescription', ca.right - 4, y0 - 4);
        ctx.restore();
      }
    };
    var peakPlugin = {
      id: 'peakAnnotation',
      afterDraw: function(chart) {
        var ctx = chart.ctx, xs = chart.scales.x, ys = chart.scales.y;
        var peakIdx = labels.indexOf(peakLbl);
        if (peakIdx < 0) return;
        var px = xs.getPixelForValue(peakIdx);
        var py = ys.getPixelForValue(peakVal);
        ctx.save();
        ctx.fillStyle = peakVal > 0 ? c.dev_pos : c.dev_neg;
        ctx.font = 'bold 10px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(peakLbl, px, py - 16);
        ctx.fillText('r = ' + peakVal.toFixed(2), px, py - 5);
        ctx.restore();
      }
    };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'bar',
      plugins: [zeroLinePlugin, peakPlugin],
      data: {
        labels: labels,
        datasets: [{
          label: 'Cross-correlation',
          data: vals,
          backgroundColor: vals.map(function(v) { return v > 0 ? c.dev_pos : c.dev_neg; }),
          borderRadius: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 26, right: 20, left: 0, bottom: 4 } },
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, title: { display: false },
          tooltip: { mode: 'index', intersect: false } },
        scales: {
          x: {
            border: { display: false },
            grid: { color: c.grid },
            title: { display: true, text: 'Lead of inflation (quarters after deviation)',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return 't+' + v; } }
          },
          y: {
            border: { display: false },
            grid: { color: c.grid },
            title: { display: true, text: 'Correlation coefficient',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v.toFixed(1); } }
          }
        }
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
