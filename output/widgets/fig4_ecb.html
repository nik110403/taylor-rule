<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">ECB · Deep Dive · 2018–2024</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">ECB Policy Deviation and Euro Area Inflation</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Simplified Taylor prescription minus ECB deposit facility rate, vs. HICP · percent · quarterly</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">ECB peak policy gap</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">+14.1pp</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Peak euro area HICP</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">9.9%</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">ECB deposit rate (end 2024)</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">3.00%</div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="ecb" data-dash="1" style="display:inline-block;width:20px;height:0;border-bottom:2px dashed #888;flex-shrink:0;"></span>ECB policy gap</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="infl" style="display:inline-block;width:20px;height:2px;background:#888;border-radius:1px;flex-shrink:0;"></span>Euro area HICP</span></div>
<div style="position:relative; width:100%; height:240px;">
<canvas id="taylor-fig4" role="img" aria-label="Dual-axis: ECB policy deviation and euro area HICP, 2015-2024"></canvas>
</div>
<p style="font-size:10px;color:var(--muted);margin-top:8px;margin-bottom:0;">ECB Taylor Rule uses r*=1.0% and inflation gap only; euro area potential output not available on FRED.</p>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Federal Reserve Economic Data (FRED)</a>, CBO. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
  var canvas = document.getElementById('taylor-fig4');
  if (!canvas) return;
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.documentElement.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)'       : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)'       : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)'       : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A'                : '#E8E6DF',
      taylor1: light ? '#185FA5'                : '#60a5fa',
      taylor2: light ? '#1D9E75'                : '#34d399',
      taylor3: light ? '#BA7517'                : '#f59e0b',
      dev_pos: light ? '#D85A30'                : '#f87171',
      dev_neg: light ? '#185FA5'                : '#60a5fa',
      ecb:     light ? '#534AB7'                : '#a78bfa',
      infl:    light ? '#A32D2D'                : '#ef4444',
      covid:   light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      text:    light ? '#1C1C1A'                : '#E8E6DF',
      muted:   light ? 'rgba(0,0,0,0.50)'       : 'rgba(255,255,255,0.55)',
    };
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) {
      if (sw.dataset.dash) sw.style.borderBottomColor = c[sw.dataset.k];
      else sw.style.background = c[sw.dataset.k];
    });
    var labels = ["2015-Q1","2015-Q2","2015-Q3","2015-Q4","2016-Q1","2016-Q2","2016-Q3","2016-Q4","2017-Q1","2017-Q2","2017-Q3","2017-Q4","2018-Q1","2018-Q2","2018-Q3","2018-Q4","2019-Q1","2019-Q2","2019-Q3","2019-Q4","2020-Q1","2020-Q2","2020-Q3","2020-Q4","2021-Q1","2021-Q2","2021-Q3","2021-Q4","2022-Q1","2022-Q2","2022-Q3","2022-Q4","2023-Q1","2023-Q2","2023-Q3","2023-Q4","2024-Q1","2024-Q2","2024-Q3","2024-Q4"];
    var covidPlugin = {
      id: 'covidShade',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, xs = chart.scales.x;
        var i1 = labels.indexOf('2020-Q1'), i2 = labels.indexOf('2022-Q1');
        if (i1 < 0 || i2 < 0) return;
        var px1 = xs.getPixelForValue(i1), px2 = xs.getPixelForValue(i2);
        ctx.save();
        ctx.fillStyle = c.covid;
        ctx.fillRect(px1, ca.top, px2 - px1, ca.bottom - ca.top);
        ctx.restore();
      }
    };
    var zeroLinePlugin = {
      id: 'zeroLine',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, ys = chart.scales.y;
        var y0 = ys.getPixelForValue(0);
        ctx.save();
        ctx.strokeStyle = c.tick; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = c.tick;
        ctx.font = '9px system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('Rules-based prescription', ca.right - 4, y0 - 4);
        ctx.restore();
      }
    };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'line',
      plugins: [covidPlugin, zeroLinePlugin],
      data: {
        labels: labels,
        datasets: [
          { label: 'ECB policy gap', data: [0.10, 0.95, 0.51, 0.67, 0.32, 0.46, 1.00, 2.04, 2.72, 2.35, 2.74, 2.42, 2.49, 3.35, 3.51, 2.68, 2.50, 2.31, 1.76, 2.50, 1.61, 0.90, 0.02, 0.08, 2.50, 3.35, 5.54, 7.95, 11.66, 13.46, 14.14, 11.80, 7.32, 4.77, 2.47, 0.36, -0.39, 0.00, -0.91, 0.64],
            borderColor: c.ecb, borderWidth: 1.5, borderDash: [5,3],
            pointRadius: 0, tension: 0.3, fill: false, yAxisID: 'y' },
          { label: 'Euro area HICP', data: [-0.06, 0.50, 0.21, 0.25, -0.05, 0.04, 0.40, 1.09, 1.54, 1.30, 1.56, 1.35, 1.39, 1.97, 2.08, 1.52, 1.40, 1.27, 0.84, 1.34, 0.74, 0.27, -0.32, -0.28, 1.33, 1.90, 3.36, 4.97, 7.44, 8.64, 9.93, 9.20, 6.88, 5.51, 4.32, 2.90, 2.41, 2.50, 1.73, 2.43],
            borderColor: c.infl, borderWidth: 2,
            pointRadius: 0, tension: 0.3, fill: false, yAxisID: 'y1' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 26, right: 20, left: 0, bottom: 4 } },
        interaction: { mode: 'index', axis: 'x', intersect: false },
        plugins: { legend: { display: false }, title: { display: false },
          tooltip: { mode: 'index', intersect: false } },
        scales: {
          x: {
            border: { display: false },
            grid: { color: c.grid },
            ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' },
              maxRotation: 0, autoSkip: false,
              callback: function(val, i) { return i % 4 === 0 ? labels[i] : null; } }
          },
          y: {
            position: 'left',
            border: { display: false },
            grid: { color: c.grid },
            title: { display: true, text: 'Policy gap (pp)',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + 'pp'; } }
          },
          y1: {
            position: 'right',
            border: { display: false },
            grid: { drawOnChartArea: false },
            title: { display: true, text: 'HICP % YoY',
              color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' } },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + '%'; } }
          }
        }
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
